<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Proyecto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: "♻️";
            font-size: 15rem;
            position: absolute;
            bottom: -50px;
            right: -50px;
            opacity: 0.1;
            transform: rotate(15deg);
            color: white;
        }

        body::after {
            content: "🌱";
            font-size: 12rem;
            position: absolute;
            top: -30px;
            left: -30px;
            opacity: 0.1;
            transform: rotate(-10deg);
            color: white;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 3rem 2.5rem;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.3);
            border: 3px solid white;
            position: relative;
            z-index: 10;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-icon {
            font-size: 4rem;
            background: linear-gradient(135deg, #2e7d32, #4caf50);
            color: white;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 20px rgba(46, 125, 50, 0.4);
            border: 4px solid white;
        }

        .login-header h1 {
            font-size: 2.2rem;
            color: #1b5e20;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: #555;
            font-size: 1rem;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-weight: bold;
            color: #2e7d32;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .input-group label i {
            font-size: 1.2rem;
        }

        .input-group input {
            padding: 1rem 1.2rem;
            border: 2px solid #c8e6c9;
            border-radius: 50px;
            font-size: 1rem;
            transition: all 0.3s;
            background: white;
        }

        .input-group input:focus {
            outline: none;
            border-color: #4caf50;
            box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.2);
        }

        .login-btn {
            background: linear-gradient(135deg, #2e7d32, #4caf50);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(46, 125, 50, 0.4);
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
        }

        .error-message {
            color: #d32f2f;
            background: #ffcdd2;
            padding: 1rem;
            border-radius: 50px;
            text-align: center;
            font-weight: bold;
            display: none;
            border: 2px solid #ef9a9a;
        }

        .error-message i {
            margin-right: 0.5rem;
        }

        .login-footer {
            text-align: center;
            margin-top: 2rem;
            color: #777;
            font-size: 0.9rem;
        }

        .login-footer i {
            color: #4caf50;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 2rem 1.5rem;
            }
            .login-header h1 {
                font-size: 1.8rem;
            }
            .login-icon {
                width: 80px;
                height: 80px;
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-icon">
                <i class="fas fa-leaf"></i>
            </div>
            <h1>Bienvenido</h1>
            <p>Ingresa tus credenciales para acceder al proyecto</p>
        </div>

        <div class="login-form">
            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i> Usuario o contraseña incorrectos
            </div>

            <div class="input-group">
                <label for="username">
                    <i class="fas fa-user"></i> Usuario
                </label>
                <input type="text" id="username" placeholder="Ingresa tu usuario" autofocus>
            </div>

            <div class="input-group">
                <label for="password">
                    <i class="fas fa-lock"></i> Contraseña
                </label>
                <input type="password" id="password" placeholder="Ingresa tu contraseña">
            </div>

            <button class="login-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Iniciar sesión
            </button>

            <div class="login-footer">
                <p><i class="fas fa-seedling"></i> Proyecto de Recolección Sostenible</p>
            </div>
        </div>
    </div>

    <script>
        const VALID_USERNAME = "Draco_end";
        const VALID_PASSWORD = "END4";

        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');

        function attemptLogin() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (username === VALID_USERNAME && password === VALID_PASSWORD) {
                window.location.href = 'bienvenido.html';
            } else {
                errorMessage.style.display = 'block';
                usernameInput.style.borderColor = '#d32f2f';
                passwordInput.style.borderColor = '#d32f2f';
                
                setTimeout(() => {
                    errorMessage.style.display = 'none';
                    usernameInput.style.borderColor = '#c8e6c9';
                    passwordInput.style.borderColor = '#c8e6c9';
                }, 3000);
            }
        }

        loginBtn.addEventListener('click', attemptLogin);

        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') attemptLogin();
        });

        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') attemptLogin();
        });

        usernameInput.addEventListener('input', () => {
            errorMessage.style.display = 'none';
            usernameInput.style.borderColor = '#c8e6c9';
            passwordInput.style.borderColor = '#c8e6c9';
        });

        passwordInput.addEventListener('input', () => {
            errorMessage.style.display = 'none';
            usernameInput.style.borderColor = '#c8e6c9';
            passwordInput.style.borderColor = '#c8e6c9';
        });
    </script>
</body>
</html>
